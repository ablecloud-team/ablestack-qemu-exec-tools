# ABLESTACK VM Hang Control - Config
#
# Installation target:
#   - ABLESTACK Host (Rocky Linux 9 based)
#
# Format:
#   - bash-style KEY=VALUE
#   - lines starting with # are comments
#
# NOTE:
#   This file is sourced by the tool. Keep it root-owned and writable only by admins.

# Policy name
HANGCTL_POLICY="default"

# Dry-run mode (1: log only, 0: normal)
HANGCTL_DRY_RUN="0"

# Timeouts (seconds)
HANGCTL_VIRSH_TIMEOUT_SEC="3"
HANGCTL_QMP_TIMEOUT_SEC="5"
HANGCTL_QGA_TIMEOUT_SEC="5"

# Hang confirm window (seconds)
HANGCTL_CONFIRM_WINDOW_SEC="120"

# Verify timeout (seconds) for post-action domstate
HANGCTL_VERIFY_TIMEOUT_SEC="3"

# Kill escalation grace (seconds) after SIGTERM before SIGKILL
HANGCTL_KILL_GRACE_SEC="2"

# Runtime directories
HANGCTL_RUN_DIR="/run/ablestack-vm-hangctl"
HANGCTL_LOG_DIR="/var/log/ablestack-vm-hangctl"

# Lock file (flock)
HANGCTL_LOCK_FILE="/run/ablestack-vm-hangctl/lock"

# State cache dir (domstate tracking)
HANGCTL_STATE_DIR="/run/ablestack-vm-hangctl/state"

# Events log file path (JSONL in later commits)
HANGCTL_EVENTS_LOG="/var/log/ablestack-vm-hangctl/events.log"
 
# Commit 09: evidence (pre-action snapshot)
HANGCTL_EVIDENCE_ENABLE="1"
HANGCTL_EVIDENCE_DIR="/var/log/ablestack-vm-hangctl/evidence"
HANGCTL_EVIDENCE_DUMPXML="1"
HANGCTL_EVIDENCE_JOURNAL_SEC="180"
HANGCTL_EVIDENCE_TIMEOUT_SEC="3"

# Commit 09: memory dump (pre-action)
# - dump file is large (RAM size). Ensure disk capacity.
HANGCTL_DUMP_ENABLE="1"
HANGCTL_DUMP_DIR="/var/lib/libvirt/dump"
HANGCTL_DUMP_TIMEOUT_SEC="60"
HANGCTL_DUMP_MIN_FREE_GB="10"
HANGCTL_DUMP_MAX_PER_SCAN="1"
HANGCTL_DUMP_SHA256="1"

# Dump completion watch (optional)
HANGCTL_DUMP_STABLE_COUNT="3"
HANGCTL_DUMP_STABLE_INTERVAL_SEC="1"

# Target filters (optional; CLI overrides these)
# - Prefer --vm for validation runs on production hosts.
# - REGEX is bash regex. Avoid spaces if possible.
HANGCTL_TARGET_VM=""
HANGCTL_INCLUDE_REGEX=""
HANGCTL_EXCLUDE_REGEX=""

# Examples:
# HANGCTL_TARGET_VM="i-2-1147-VM"
# HANGCTL_INCLUDE_REGEX="^i-"
# HANGCTL_EXCLUDE_REGEX="^(mgmt-|infra-)"
