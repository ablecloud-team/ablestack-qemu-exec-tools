# ABLESTACK VM FT Control - Config
#
# Skeleton configuration for unified HA/DR/FT control.

FTCTL_POLICY="default"
FTCTL_DRY_RUN="0"

FTCTL_RUN_DIR="/run/ablestack-vm-ftctl"
FTCTL_LOG_DIR="/var/log/ablestack-vm-ftctl"
FTCTL_EVENTS_LOG="/var/log/ablestack-vm-ftctl/events.log"
FTCTL_LOCK_FILE="/run/ablestack-vm-ftctl/lock"
FTCTL_STATE_DIR="/run/ablestack-vm-ftctl/state"
FTCTL_PROFILE_DIR="/etc/ablestack/ftctl.d"

FTCTL_DEFAULT_PRIMARY_URI="qemu:///system"
FTCTL_DEFAULT_PEER_URI="qemu+ssh://peer/system"

FTCTL_HEALTH_INTERVAL_SEC="2"
FTCTL_FAILOVER_CONFIRM_SEC="4"
FTCTL_FENCING_TIMEOUT_SEC="15"
FTCTL_FENCING_SSH_USER="root"

# Treat transport-only loss within this window as a re-arm target, not immediate failover.
FTCTL_TRANSIENT_NET_GRACE_SEC="3"
FTCTL_MAX_REARM_ATTEMPTS="5"
FTCTL_REARM_BACKOFF_SEC="2"

FTCTL_BLOCKCOPY_BANDWIDTH_MIB="0"
FTCTL_BLOCKCOPY_SYNC_WRITES="1"
FTCTL_BLOCKCOPY_GRANULARITY="0"
FTCTL_BLOCKCOPY_WAIT_TIMEOUT_SEC="30"
FTCTL_BLOCKCOPY_TARGET_BASE_DIR="/var/lib/ablestack-vm-ftctl/blockcopy"
FTCTL_XML_BACKUP_DIR="/var/lib/ablestack-vm-ftctl/xml"
FTCTL_STANDBY_VERIFY_TIMEOUT_SEC="20"
FTCTL_REMOTE_NBD_PORT_BASE="10809"
FTCTL_REMOTE_NBD_PORT_COUNT="64"
FTCTL_REMOTE_NBD_MAX_CONCURRENT="64"
FTCTL_XCOLO_PROXY_PORT="9000"
FTCTL_XCOLO_MIGRATE_PORT="9998"
FTCTL_XCOLO_MIRROR_PORT="9003"
FTCTL_XCOLO_COMPARE_PORT="9004"
FTCTL_XCOLO_COMPARE_LOCAL_PORT="9001"
FTCTL_XCOLO_COMPARE_OUT_PORT="9005"

# Backend-mode defaults are selected per VM profile.
# shared-blockcopy:
#   - use explicit shared-visible FTCTL_PROFILE_DISK_MAP paths
# remote-nbd:
#   - use FTCTL_PROFILE_SECONDARY_TARGET_DIR and remote export fields
#   - export ports are allocated from FTCTL_REMOTE_NBD_PORT_BASE..BASE+COUNT-1

FTCTL_XCOLO_CONTROL_NET=""
FTCTL_XCOLO_REPL_NET=""
FTCTL_XCOLO_QMP_TIMEOUT_SEC="3"
