name: WinPE Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-winpe-core.yml
    with:
      architecture: "amd64"
      iso_base_name: "winpe-ablestack-v2k"
      iso_suffix: ""                # л¶іл¶ђм¶ИлКФ suffix ?ЖмЭі к≥†м†Х
      artifact_name: "winpe-iso-release"
      retention_days: 30

  attach:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: List files
        shell: bash
        run: |
          ls -al dist

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # ?ілЦ§ ?ЬкЈЄ л¶іл¶ђм¶ИмЧР лґЩмЭЉмІА л™ЕмЛЬ (tag push ?іл≤§??кЄ∞м?)
          tag_name: ${{ github.ref_name }}
          # л¶іл¶ђм¶?л≥ЄлђЄ/?ЄнКЄ??build.yml???µнХ© ?ЭмД±(кґМмЮ•) ???ђкЄ∞?ЬлКФ к±ілУЬл¶ђм? ?КмЭМ
          generate_release_notes: false
          files: |
            dist/*.iso
            dist/SHA256SUMS
          # ?∞мґЬлђ??ДлЭљ ??м°∞кЄ∞ ?§нМ®(л¶іл¶ђм¶??ДлЭљ л∞©м?)
          fail_on_unmatched_files: true