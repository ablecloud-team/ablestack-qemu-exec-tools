          EOF

          dnf clean all
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" makecache

          # curl ?寃몃쳳????怨뺣룛: curl-minimal vs curl
          # - ???쳜???????뺢퀣伊????고뱺 curl-minimal??濚밸Ŧ????롪퍔??? ?熬곣뫗????allowerasing??怨쀬Ŧ 嶺뚳퐣瑗??          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install \
