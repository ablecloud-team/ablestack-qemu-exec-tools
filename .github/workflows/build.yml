name: Build and Release ablestack-qemu-exec-tools

on:
  workflow_run:
    workflows: ["WinPE Release Build"]
    types:
      - completed

permissions:
  contents: write

# NOTE (WinPE ISO)
# - WinPE ISO artifacts are produced by the dedicated WinPE release workflows.
# - This workflow optionally downloads the released WinPE ISO and bundles it into the final release artifacts.
# - If the WinPE ISO is unavailable, packaging continues without it.
# - If the WinPE ISO is not available, packaging continues without it.
jobs:
  # 1) RPM BUILD (Rocky 9.6)
  # 1) RPM BUILD (Rocky 9.6)
  # ======================================================================
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps (Rocky 9.6 vault)
        run: |
          set -euo pipefail
          cat > /etc/yum.repos.d/rocky-vault-9.6.repo <<'EOF'
          [rocky-vault-9.6-baseos]
          name=Rocky Linux 9.6 - BaseOS (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/BaseOS/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-appstream]
          name=Rocky Linux 9.6 - AppStream (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/AppStream/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-crb]
          name=Rocky Linux 9.6 - CRB (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/CRB/$basearch/os/
          enabled=1
          gpgcheck=0
          EOF

          dnf clean all
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" makecache
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install make rpm-build tar git dnf-plugins-core createrepo_c

      - name: Build RPM
        run: make rpm

      - name: Create RPM repo (with dependencies) for Rocky 9.6
        run: |
          set -euo pipefail
          WORKDIR="repo/rpm-rocky9.6"
          mkdir -p "$WORKDIR"
          cp rpmbuild/RPMS/*/*.rpm "$WORKDIR"/

          echo "[INFO] Downloading runtime dependencies..."
          dnf --disablerepo="*" --enablerepo="rocky-vault-9.6-*" download --resolve --alldeps \
            --destdir="$WORKDIR" \
            bash jq libvirt-client cloud-init || true

          echo "[INFO] Creating repo metadata..."
          createrepo_c "$WORKDIR"

          mkdir -p release/rpm
          mv repo release/rpm/

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package-9.6
          path: release/rpm/**
  build-hangctl-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps (hangctl, Rocky 9.6 vault)
        run: |
          set -euo pipefail
          cat > /etc/yum.repos.d/rocky-vault-9.6.repo <<'EOF'
          [rocky-vault-9.6-baseos]
          name=Rocky Linux 9.6 - BaseOS (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/BaseOS/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-appstream]
          name=Rocky Linux 9.6 - AppStream (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/AppStream/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-crb]
          name=Rocky Linux 9.6 - CRB (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/CRB/$basearch/os/
          enabled=1
          gpgcheck=0
          EOF
          dnf clean all
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" makecache
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install make rpm-build tar git dnf-plugins-core createrepo_c systemd-rpm-macros systemd

      - name: Build HANGCTL RPM (ablestack_vm_hangctl.spec)
        shell: bash
        run: |
          set -euo pipefail

          SPEC="rpm/ablestack_vm_hangctl.spec"
          test -f "${SPEC}" || (echo "[ERR] Missing spec: ${SPEC}" >&2; exit 2)
          # Read VERSION / RELEASE from the repository VERSION file
          VERSION="$(. ./VERSION; printf "%s" "$VERSION" | tr -d '\r\n[:space:]')"
          RELEASE="$(. ./VERSION; printf "%s" "$RELEASE" | tr -d '\r\n[:space:]')"
          GIT_HASH="$(git rev-parse --short HEAD 2>/dev/null || echo nogit)"

          echo "[INFO] VERSION=${VERSION} RELEASE=${RELEASE} GIT_HASH=${GIT_HASH}"

          mkdir -p rpmbuild_hangctl/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          # Pack sources to a tarball matching the spec Source0 name
          # Pack sources to a tarball that matches the spec Source0 name
          NAME_HANGCTL="ablestack_vm_hangctl"
          TMP_TGZ="$(mktemp /tmp/${NAME_HANGCTL}-${VERSION}.tar.gz.XXXXXX)"
          tar czf "${TMP_TGZ}" \
            --transform="s,^,${NAME_HANGCTL}-${VERSION}/," \
            --exclude=./rpmbuild \
            --exclude=./rpmbuild_v2k \
            --exclude=./rpmbuild_hangctl \
            --exclude=./build \
            --exclude=./release \
            --exclude=./repo \
            --exclude=./dist \
            .
          mv -f "${TMP_TGZ}" "rpmbuild_hangctl/SOURCES/${NAME_HANGCTL}-${VERSION}.tar.gz"

          cp "${SPEC}" rpmbuild_hangctl/SPECS/

          rpmbuild --noplugins -ba --define "_topdir $(pwd)/rpmbuild_hangctl" \
                   --define "version ${VERSION}" \
                   --define "release ${RELEASE}" \
                   --define "githash ${GIT_HASH}" \
                   "rpmbuild_hangctl/SPECS/ablestack_vm_hangctl.spec"

          mkdir -p build/rpm-hangctl
          cp rpmbuild_hangctl/RPMS/noarch/*.rpm build/rpm-hangctl/ 2>/dev/null || true
          cp rpmbuild_hangctl/RPMS/*/*.rpm build/rpm-hangctl/ 2>/dev/null || true

          echo "[INFO] Built RPM(s):"
          ls -lah build/rpm-hangctl || true

      - name: Create HANGCTL RPM repo (Rocky 9.6)
        shell: bash
        run: |
          set -euo pipefail
          WORKDIR="repo/hangctl-rpm-rocky9.6"
          mkdir -p "$WORKDIR"
          # Copy built hangctl RPMs into the local repository
          cp -v build/rpm-hangctl/*.rpm "$WORKDIR"/

          echo "[INFO] Creating repo metadata..."
          createrepo_c "$WORKDIR"

          mkdir -p release/hangctl-rpm
          mv repo release/hangctl-rpm/

      - uses: actions/upload-artifact@v4
        with:
          name: hangctl-rpm-package
          path: release/hangctl-rpm/**

  # ======================================================================
  # 1-B) FTCTL RPM BUILD (Rocky 9.6)
  # ======================================================================
  build-ftctl-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps (ftctl, Rocky 9.6 vault)
        run: |
          set -euo pipefail
          cat > /etc/yum.repos.d/rocky-vault-9.6.repo <<'EOF'
          [rocky-vault-9.6-baseos]
          name=Rocky Linux 9.6 - BaseOS (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/BaseOS/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-appstream]
          name=Rocky Linux 9.6 - AppStream (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/AppStream/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-crb]
          name=Rocky Linux 9.6 - CRB (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/CRB/$basearch/os/
          enabled=1
          gpgcheck=0
          EOF
          dnf clean all
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" makecache
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install make rpm-build tar git dnf-plugins-core createrepo_c systemd-rpm-macros systemd

      - name: Build FTCTL RPM (ablestack_vm_ftctl.spec)
        shell: bash
        run: |
          set -euo pipefail
          make ftctl-rpm

      - name: Create FTCTL RPM repo (Rocky 9.6)
        shell: bash
        run: |
          set -euo pipefail
          WORKDIR="repo/ftctl-rpm-rocky9.6"
          mkdir -p "$WORKDIR"
          cp -v build/rpm-ftctl/*.rpm "$WORKDIR"/
          createrepo_c "$WORKDIR"
          mkdir -p release/ftctl-rpm
          mv repo release/ftctl-rpm/

      - uses: actions/upload-artifact@v4
        with:
          name: ftctl-rpm-package
          path: release/ftctl-rpm/**

          
  # 1-C) V2K RPM BUILD (isolated from other RPM build paths)
  # 1-C) V2K RPM BUILD (isolated path to avoid overlap with other RPM jobs)
  # ======================================================================
  build-v2k-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps (v2k)
        run: |
          set -euo pipefail

          # Pin build dependencies to Rocky Linux 9.6 vault for deterministic inputs
          # Create explicit vault repository definitions instead of relying on mirrorlist rewriting.
          # This keeps the container build inputs stable.
          # This avoids mismatched release/baseurl behavior in containers.
          cat > /etc/yum.repos.d/rocky-vault-9.6.repo <<'EOF'
          [rocky-vault-9.6-baseos]
          name=Rocky Linux 9.6 - BaseOS (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/BaseOS/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-appstream]
          name=Rocky Linux 9.6 - AppStream (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/AppStream/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-crb]
          name=Rocky Linux 9.6 - CRB (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/CRB/$basearch/os/
          enabled=1
          gpgcheck=0
          EOF

          dnf clean all
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" makecache
          # Handle curl vs curl-minimal replacement in the Rocky container image
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install \
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install \
            --allowerasing ca-certificates curl-minimal || true

          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" install \
            make rpm-build tar git dnf-plugins-core createrepo_c

      - name: Configure Rocky 9.6 vault repos + enable EPEL (build-time only)
        run: |
          set -euo pipefail
          # Recreate Rocky Linux 9.6 vault repos and enable EPEL for build-time dependencies
          # Avoid mutable mirrorlist behavior inside the CI container.
          # Reuse the same repo family later for repoquery and download.
          # The same repo family is reused for repoquery and dependency download.

          cat > /etc/yum.repos.d/rocky-vault-9.6.repo <<'EOF'
          [rocky-vault-9.6-baseos]
          name=Rocky Linux 9.6 - BaseOS (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/BaseOS/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-appstream]
          name=Rocky Linux 9.6 - AppStream (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/AppStream/$basearch/os/
          enabled=1
          gpgcheck=0

          [rocky-vault-9.6-crb]
          name=Rocky Linux 9.6 - CRB (vault)
          baseurl=https://dl.rockylinux.org/vault/rocky/9.6/CRB/$basearch/os/
          enabled=1
          gpgcheck=0
          EOF

          echo "[INFO] Enabled repos (vault 9.6):"
          grep -nE '^\[|^baseurl=' /etc/yum.repos.d/rocky-vault-9.6.repo

          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*" makecache
          # Enable EPEL only for build-time dependencies such as nbd-related packages
          # Install epel-release directly because it may not resolve from vault-only repos.
          # Detect the active EPEL repo id after installation.
          # Use that detected repo id for later repoquery/download steps.
          # Use the detected repo id for later repoquery and download steps.
          EPEL_RPM_URL="https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm"
          echo "[INFO] Installing EPEL release RPM: ${EPEL_RPM_URL}"
          curl -fL -o /tmp/epel-release.rpm "${EPEL_RPM_URL}"
          rpm -Uvh --nosignature /tmp/epel-release.rpm

          # Detect the effective EPEL repository id after epel-release installation
          EPEL_REPO_ID="$(dnf repolist all 2>/dev/null | awk 'tolower($1) ~ /^epel/ {print $1; exit}')"
          if [[ -z "${EPEL_REPO_ID}" ]]; then
            echo "[ERR] EPEL repo id not found after installing epel-release." >&2
            dnf repolist all || true
            exit 2
          fi
          echo "[INFO] Detected EPEL repo id: ${EPEL_REPO_ID}"
          echo "EPEL_REPO_ID=${EPEL_REPO_ID}" >> "$GITHUB_ENV"

          # Build metadata cache for the combined vault + EPEL repository set
          dnf -y --disablerepo="*" --enablerepo="rocky-vault-9.6-*","${EPEL_REPO_ID}" makecache          

      - name: Build V2K RPM (separate path)
        run: |
          set -e
          # Build V2K RPM in an isolated path to avoid overlap with other packaging jobs
          make v2k-rpm
 
      - name: Verify ablestack_v2k rpm contains bash completion
        shell: bash
        run: |
          set -euo pipefail
          RPM_FILE=$(ls -1 build/rpm-v2k/ablestack_v2k-*.rpm | head -n 1)
          echo "[INFO] verifying rpm: ${RPM_FILE}"
          rpm -qlp "${RPM_FILE}" | grep -E "bash-completion/completions/ablestack_v2k$" >/dev/null
          echo "[OK] bash completion is packaged"

      - name: Create V2K RPM repo (offline) for ABLESTACK (Rocky 9.6)
        run: |
          set -e
          WORKDIR="release/v2k/v2k-rpm-rocky9.6"
          mkdir -p "$WORKDIR"

          # Collect the V2K RPM output into the final offline release directory
          find . -type f -name "*.rpm" \( -iname "*ablestack*v2k*.rpm" -o -iname "*ablestack_v2k*.rpm" \) -exec cp -v {} "$WORKDIR"/ \;

          echo "[INFO] Collecting runtime deps for Air-Gap (Requires closure minus ABLESTACK baseline)..."

          # Force repository resolution to Rocky Linux 9.6 only
          : "${EPEL_REPO_ID:?EPEL_REPO_ID is not set. Configure step must export it to GITHUB_ENV}"
          # Use an explicit option array for deterministic dnf behavior
          DNF_COMMON_OPTS=(
            --releasever=9.6
            --disablerepo=*
            --enablerepo="rocky-vault-9.6-*","${EPEL_REPO_ID}"
            --setopt=install_weak_deps=False
          )

          # Runtime package closure follows the V2K RPM Requires set
          REQ_PKGS="jq python3 openssl nbd nbdkit nbdkit-vddk-plugin qemu-img libvirt-client"

          # Baseline package list captured from an ABLESTACK 9.6 host
          BASELINE_FILE="rpm/v2k_baseline_pkgs_ablestack_9.6.txt"
          if [[ ! -f "${BASELINE_FILE}" ]]; then
            echo "[ERR] Missing baseline file: ${BASELINE_FILE}" >&2
            echo "      Generate on ABLESTACK 9.6 host:" >&2
            echo "        rpm -qa --qf '%{NAME}\\n' | sort -u > ${BASELINE_FILE}" >&2
            exit 2
          fi

          echo "[INFO] Sanity check: required pkgs availability (repo view)"
          # Ensure required packages are visible in the enabled repositories before continuing
          dnf -q "${DNF_COMMON_OPTS[@]}" repoquery --available ${REQ_PKGS} >/dev/null

          # Install dnf-plugins-core so repoquery is available
          dnf -y "${DNF_COMMON_OPTS[@]}" install dnf-plugins-core >/dev/null
          dnf -q "${DNF_COMMON_OPTS[@]}" repoquery \
            --requires --resolve --recursive \
            --qf '%{name}' \
            ${REQ_PKGS} | sort -u > /tmp/v2k_dep_closure.txt

          printf '%s\n' ${REQ_PKGS} | sort -u > /tmp/v2k_must_have.txt


          # Subtract baseline packages from the resolved dependency closure
          sort -u "${BASELINE_FILE}" > /tmp/v2k_baseline.txt
          comm -23 /tmp/v2k_dep_closure.txt /tmp/v2k_baseline.txt > /tmp/v2k_to_download_closure.txt

          printf '%s\n' ${REQ_PKGS} | sort -u > /tmp/v2k_must_have.txt

          # baseline subtract (closure - baseline)
          sort -u "${BASELINE_FILE}" > /tmp/v2k_baseline.txt
          comm -23 /tmp/v2k_dep_closure.txt /tmp/v2k_baseline.txt > /tmp/v2k_to_download_closure.txt

          # must-have + (closure-baseline) = candidate list
          cat /tmp/v2k_must_have.txt /tmp/v2k_to_download_closure.txt | sort -u > /tmp/v2k_to_download_candidate.txt

          echo "[INFO] Candidate(to-download) count: $(wc -l < /tmp/v2k_to_download_candidate.txt)"
          echo "[INFO] Candidate sample (first 50):"
          head -n 50 /tmp/v2k_to_download_candidate.txt || true

          echo "[INFO] Filtering candidate list by repo availability (STRICT)..."
          # Filter candidate package names by repository availability in strict mode
          : > /tmp/v2k_to_download_avail.txt
          cat /tmp/v2k_to_download_candidate.txt \
            | xargs -r -n 200 dnf -q "${DNF_COMMON_OPTS[@]}" repoquery --available --qf '%{name}' \
            | sort -u > /tmp/v2k_to_download_avail.txt

          grep -vE '^glibc-all-langpacks$|^glibc-langpack-' /tmp/v2k_to_download_avail.txt \
            | sort -u > /tmp/v2k_to_download.txt

          comm -23 /tmp/v2k_to_download_candidate.txt /tmp/v2k_to_download_avail.txt > /tmp/v2k_missing_in_repo.txt
          if [[ -s /tmp/v2k_missing_in_repo.txt ]]; then
            echo "[WARN] Missing in enabled repos (skipped):"
            head -n 50 /tmp/v2k_missing_in_repo.txt || true
          fi

          echo "[INFO] Final to-download count(after avail+langpack filter): $(wc -l < /tmp/v2k_to_download.txt)"
          echo "[INFO] Final to-download sample (first 50):"
          head -n 50 /tmp/v2k_to_download.txt || true

          for p in nbd nbdkit qemu-img; do
            if ! grep -qx "$p" /tmp/v2k_to_download.txt && ! grep -qx "$p" /tmp/v2k_baseline.txt; then
              echo "[ERR] Required package '$p' is neither in baseline nor in final download list." >&2
              exit 2
            fi
          done
          # Download the final package set
          # Download the final package set
          if [[ -s /tmp/v2k_to_download.txt ]]; then
            xargs -r dnf "${DNF_COMMON_OPTS[@]}" download --destdir="$WORKDIR" < /tmp/v2k_to_download.txt
          else
            echo "[INFO] Nothing to download (all deps satisfied by baseline)."
          fi

          echo "[INFO] Creating repo metadata (createrepo_c)..."
          createrepo_c "$WORKDIR"

          echo "[INFO] Repo metadata sanity check:"
          test -f "$WORKDIR/repodata/repomd.xml"
          ls -al "$WORKDIR/repodata" | head -n 50 || true

      - uses: actions/upload-artifact@v4
        with:
          name: v2k-rpm-package
          path: release/v2k/**

  # ======================================================================
  # 2) DEB BUILD (Ubuntu 22.04 / 24.04)
  # ======================================================================
  build-deb:
    strategy:
      matrix:
        os_version: [22.04, 24.04]
    runs-on: ubuntu-${{ matrix.os_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential make dpkg-dev debhelper git apt-utils

      - name: Build DEB
        run: make deb

      - name: Download dependencies and create APT repo
        run: |
          set -e
          sudo apt-get update -y

          mkdir -p repo/pool
          find build/deb -type f -name "*.deb" -exec cp {} repo/pool/ \;

          cd repo/pool

          echo "[INFO] Starting dependency collection..."
          seen_pkgs=""
          new_pkgs=1
          while [ "$new_pkgs" -eq 1 ]; do
            new_pkgs=0
            for deb in *.deb; do
              [ -e "$deb" ] || continue
              P=$(dpkg-deb -f "$deb" Package)
              if echo "$seen_pkgs" | grep -qw "$P"; then
                continue
              fi
              seen_pkgs="$seen_pkgs $P"

              DEPS=$(dpkg-deb -f "$deb" Depends | \
                     tr ',' '\n'          | \
                     sed -E 's/\(.*\)//g' | \
                     sed 's/|/ /g'        | \
                     sed 's/:any//g'      | \
                     awk '{print $1}'     | \
                     grep -v '^$'         | \
                     sort -u)
              echo "[INFO] [$P] depends on: $DEPS"

              for dep in $DEPS; do
                [ -n "$dep" ] || continue
                # Download the dependency only if it is not already present in repo/pool
                if ls -1 ${dep}_*.deb >/dev/null 2>&1; then
                  continue
                fi
                echo "[INFO] Downloading: $dep"
                if apt-get download "$dep"; then
                  new_pkgs=1
                else
                  echo "[WARN] Failed to download: $dep"
                fi
              done
            done
          done

          echo "[INFO] Total pool count: $(ls -1 *.deb | wc -l)"

          cd ../..
          # Generate repository metadata using repo/pool as the package source
          mkdir -p repo/dists/stable/main/binary-amd64
          ( cd repo && dpkg-scanpackages pool /dev/null | gzip -9c > dists/stable/main/binary-amd64/Packages.gz )

          # Build the final DEB repository structure
          mv repo "deb-ubuntu${{ matrix.os_version }}"
          mkdir -p release/deb
          mv deb-ubuntu${{ matrix.os_version }} release/deb/

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package-${{ matrix.os_version }}
          path: release/deb/**

  # ======================================================================
  # 3) WINDOWS MSI BUILD
  # ======================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.*

      - name: Add dotnet tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        run: make windows

      - uses: actions/upload-artifact@v4
        with:
          name: msi-package
          path: windows/msi/out/*

  # ======================================================================
  # 4) RELEASE + ISO CREATION (VirtIO ???? ????
  # ======================================================================
  release:
    needs: [build-rpm, build-hangctl-rpm, build-ftctl-rpm, build-deb, build-windows, build-v2k-rpm]
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve tag from workflow_run
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.workflow_run.head_branch }}"
          if [[ -z "$TAG" ]]; then
            echo "[ERR] workflow_run.head_branch is empty (cannot determine tag)" >&2
            exit 2
          fi
          if [[ "$TAG" != v* ]]; then
            echo "[ERR] head_branch is not a v* tag: $TAG" >&2
            exit 2
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Download WinPE ISO from GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release/winpe

          echo "[INFO] Downloading WinPE ISO assets for tag: ${RELEASE_TAG}"
          # Download the WinPE ISO artifact from the release when available
          gh release download "${RELEASE_TAG}" \
            -p "*winpe*.iso" \
            -p "SHA256SUMS" \
            -D release/winpe || true

          if ls -1 release/winpe/*.iso >/dev/null 2>&1; then
            echo "[OK] WinPE ISO staged:"
            ls -lah release/winpe
          else
            echo "[WARN] WinPE ISO not found in release assets for ${RELEASE_TAG}. Continuing without it."
          fi

      - name: Install packaging tools (genisoimage, 7zip)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y genisoimage p7zip-full python3-pip

      - name: Collect artifacts into structured dirs
        run: |
          set -e
          mkdir -p release/rpm release/deb release/msi release/assets/v2k/wheels release/v2k release/completions release/bin

          echo "[INFO] Collecting RPM repos..."
          for ver in 9.6; do
            SRC_DIR=$(find dist -type d -path "*/rpm-package-${ver}/release/rpm/repo/rpm-rocky${ver}" | head -n 1)
            if [ -d "$SRC_DIR" ]; then
              echo "[INFO] Found $SRC_DIR"
              mkdir -p release/rpm/rpm-rocky${ver}
              cp -r "$SRC_DIR"/* release/rpm/rpm-rocky${ver}/
            else
              SRC_DIR=$(find dist -type d -path "*/rpm-package-${ver}/repo/rpm-rocky${ver}" | head -n 1)
              if [ -d "$SRC_DIR" ]; then
                echo "[INFO] Found (fallback) $SRC_DIR"
                mkdir -p release/rpm/rpm-rocky${ver}
                cp -r "$SRC_DIR"/* release/rpm/rpm-rocky${ver}/
              else
                echo "[WARN] No RPM repo found for version ${ver}"
              fi
            fi
          done

          echo "[INFO] Collecting HANGCTL RPM repo (Rocky 9.6)..."
          HANGCTL_DIR="$(find dist -type d \( \
                          -path "*/hangctl-rpm-package/release/hangctl-rpm/repo/hangctl-rpm-rocky9.6" -o \
                          -path "*/hangctl-rpm-package/repo/hangctl-rpm-rocky9.6" \
                        \) | head -n 1 || true)"
          if [[ -n "${HANGCTL_DIR}" && -d "${HANGCTL_DIR}" ]]; then
            echo "[INFO] Found ${HANGCTL_DIR}"
            mkdir -p release/rpm/hangctl-rpm-rocky9.6
            cp -r "${HANGCTL_DIR}/." release/rpm/hangctl-rpm-rocky9.6/
          else
            echo "[WARN] No HANGCTL RPM repo found (hangctl-rpm-package)."
          fi

          echo "[INFO] Collecting FTCTL RPM repo (Rocky 9.6)..."
          FTCTL_DIR="$(find dist -type d \( \
                          -path "*/ftctl-rpm-package/release/ftctl-rpm/repo/ftctl-rpm-rocky9.6" -o \
                          -path "*/ftctl-rpm-package/repo/ftctl-rpm-rocky9.6" \
                        \) | head -n 1 || true)"
          if [[ -n "${FTCTL_DIR}" && -d "${FTCTL_DIR}" ]]; then
            echo "[INFO] Found ${FTCTL_DIR}"
            mkdir -p release/rpm/ftctl-rpm-rocky9.6
            cp -r "${FTCTL_DIR}/." release/rpm/ftctl-rpm-rocky9.6/
          else
            echo "[WARN] No FTCTL RPM repo found (ftctl-rpm-package)."
          fi

          echo "[INFO] Staging bash completion files..."
          if [[ -f completions/ablestack_v2k ]]; then
            cp -f completions/ablestack_v2k release/completions/
          fi
          if [[ -f completions/ablestack_vm_ftctl ]]; then
            cp -f completions/ablestack_vm_ftctl release/completions/
          fi

          echo "[INFO] Collecting DEB repos..."
          for ver in 22.04 24.04; do
            SRC_DIR=$(find dist -type d \( \
                        -path "*/deb-package-${ver}/release/deb/deb-ubuntu${ver}" -o \
                        -path "*/deb-package-${ver}/deb-ubuntu${ver}" \
                      \) | head -n 1)
            if [ -d "$SRC_DIR" ]; then
              echo "[INFO] Found $SRC_DIR"
              mkdir -p release/deb/deb-ubuntu${ver}
              cp -r "$SRC_DIR"/* release/deb/deb-ubuntu${ver}/
            else
              echo "[WARN] No DEB repo found for version ${ver}"
            fi
          done

          echo "[INFO] Collecting MSI artifacts..."
          find dist -type f -path "*/msi-package/*" -exec cp {} release/msi/ \;

          echo "[INFO] Staging helper scripts..."
          if [[ -f bin/v2k_test_install.sh ]]; then
            cp -f bin/v2k_test_install.sh release/bin/
          fi

      - name: Collect V2K RPM repo (Rocky 9.6) into ISO tree
        shell: bash
        run: |
          set -euo pipefail
          # build-v2k-rpm outputs: release/v2k/v2k-rpm-rocky9.6
          SRC_DIR=$(find dist -type d -path "*/v2k-rpm-package/v2k-rpm-rocky9.6" -o -path "*/v2k-rpm-package/release/v2k/v2k-rpm-rocky9.6" | head -n 1 || true)
          if [[ -z "${SRC_DIR}" || ! -d "${SRC_DIR}" ]]; then
            echo "[ERR] No V2K RPM repo found in workflow artifacts." >&2
            echo "[ERR] Debug: listing dist/v2k-rpm-package tree (maxdepth=6)" >&2
            find dist -maxdepth 6 -path "*v2k-rpm-package*" -print >&2 || true
            exit 2
          fi

          echo "[INFO] Found V2K repo: ${SRC_DIR}"
          mkdir -p release/v2k/v2k-rpm-rocky9.6
          # Preserve repodata/ and all rpm files
          cp -a "${SRC_DIR}/." release/v2k/v2k-rpm-rocky9.6/

      - name: Stage V2K assets from repo ./assets into ISO (govc, VDDK)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/assets release/assets/compat release/assets/v2k release/share/ablestack/v2k
          cp -v assets/govc_Linux_x86_64.tar.gz release/assets/ || true
          cp -v assets/VMware-vix-disklib-*.tar.gz release/assets/ || true
          if [[ -d assets/compat ]]; then
            cp -a assets/compat/. release/assets/compat/
          fi
          if [[ -d share/ablestack/v2k/compat ]]; then
            cp -a share/ablestack/v2k/compat release/share/ablestack/v2k/
          fi

      - name: Prepare pyvmomi offline wheels (Air-Gap)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip download -d release/assets/v2k/wheels "pyvmomi==8.0.3.0.1"

      # VirtIO Windows payload (amd64 drivers and guest tools)
      # Extract only the payloads required by the Windows installer and WinPE flow.
      - name: Download & extract VirtIO (amd64-only + guest tools)
        run: |
          set -e
          mkdir -p dist/virtio-src release/virtio
          curl -fL -o dist/virtio-win.iso \
            "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"

          # Extract amd64 driver payloads used by DISM/WinPE
          7z x -y -o"dist/virtio-src" dist/virtio-win.iso \
            "viostor/*/amd64/*" \
            "vioscsi/*/amd64/*" \
            "NetKVM/*/amd64/*" \
            "Balloon/*/amd64/*" \
            "qemupciserial/*/amd64/*" \
            "viorng/*/amd64/*" \
            "pvpanic/*/amd64/*" \
            "vioinput/*/amd64/*" \
            "vioser/*/amd64/*" || true

          # Extract guest tools installers (exe/msi)
          7z x -y -o"dist/virtio-src" dist/virtio-win.iso "virtio-win-guest-tools.exe" || true
          7z x -y -o"dist/virtio-src" dist/virtio-win.iso "virtio-win-gt-*.msi" || true

          # Stage extracted driver trees into release/virtio
          for d in viostor vioscsi NetKVM Balloon qemupciserial viorng pvpanic vioinput vioser; do
            if [[ -d "dist/virtio-src/${d}" ]]; then
              mkdir -p "release/virtio/${d}"
              cp -a "dist/virtio-src/${d}/." "release/virtio/${d}/"
            fi
          done
          if [[ -f "dist/virtio-src/virtio-win-guest-tools.exe" ]]; then
            cp -a "dist/virtio-src/virtio-win-guest-tools.exe" "release/virtio/"
          fi
          shopt -s nullglob
          for m in dist/virtio-src/virtio-win-gt-*.msi; do
            cp -a "$m" "release/virtio/"
          done
          shopt -u nullglob

          echo "[INFO] virtio payload size:"
          du -sh release/virtio || true
          echo "[INFO] sample INF files:"
          find release/virtio -type f -name '*.inf' | head -n 30 || true

      - name: Stage WinPE ISO into ISO tree (optional)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/winpe

          # Search for an existing WinPE ISO in artifacts, assets, or local winpe paths
          # If not found, continue without bundling WinPE into the final ISO set.
          WINPE_ISO=""
          WINPE_ISO="$(find dist -type f -iname '*.iso' -iname '*winpe*' 2>/dev/null | head -n 1 || true)"
          if [[ -z "$WINPE_ISO" ]]; then
            WINPE_ISO="$(find assets -type f -iname '*.iso' -iname '*winpe*' 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -z "$WINPE_ISO" ]]; then
            WINPE_ISO="$(find winpe -maxdepth 2 -type f -iname '*.iso' 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -n "$WINPE_ISO" && -f "$WINPE_ISO" ]]; then
            echo "[INFO] Found WinPE ISO: $WINPE_ISO"
            cp -a "$WINPE_ISO" release/winpe/
            echo "[OK] Staged WinPE ISO(s):"
            ls -lah release/winpe/*.iso || true
          else
            echo "[WARN] WinPE ISO not found. (release/winpe will be empty)"
            echo "       - If you want WinPE ISO included in ABLESTACK-Tools ISO, place it at one of:"
            echo "         * dist/**/winpe*.iso (artifact)"
            echo "         * assets/**/winpe*.iso"
            echo "         * winpe/*.iso"
          fi

      # Windows installer script generation (install.ps1 / install.bat)
      - name: Create Windows installer scripts
        shell: bash
        run: |
          cat > release/install.ps1 << 'PS1'
          Param(
            [switch]$Silent
          )

          # Force default = false if not provided
          if (-not $PSBoundParameters.ContainsKey('Silent')) {
            $Silent = $false
          }

          # Debug print
          Write-Host "[DEBUG] Silent mode: $Silent"

          function Ensure-Admin {
            $id = [Security.Principal.WindowsIdentity]::GetCurrent()
            $p  = New-Object Security.Principal.WindowsPrincipal($id)
            if (-not $p.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
              Write-Host "[INFO] Elevation required. Re-launching as Administrator..."
              $psi = New-Object System.Diagnostics.ProcessStartInfo
              $psi.FileName  = "powershell.exe"
              $psi.Arguments = "-NoProfile -ExecutionPolicy Bypass -File `"$($MyInvocation.MyCommand.Path)`" " + ($args -join ' ')
              $psi.Verb = "runas"
              [Diagnostics.Process]::Start($psi) | Out-Null
              exit
            }
          }

          # WinForms GUI setup
          $Global:GuiReady = $false
          try {
            Add-Type -AssemblyName System.Windows.Forms -ErrorAction Stop
            $Global:GuiReady = $true
          } catch {
            $Global:GuiReady = $false 
            Write-Host "[WARN] Cannot load System.Windows.Forms. GUI dialogs will be disabled."
          }

          function Show-Info([string]$text) {
            if ($Global:GuiReady -and -not $Silent) {
              [void][System.Windows.Forms.MessageBox]::Show(
                $text,
                "ABLESTACK Installer",
                [System.Windows.Forms.MessageBoxButtons]::OK,
                [System.Windows.Forms.MessageBoxIcon]::Information
              )
            } else {
              Write-Host $text
            }
          }

          function Prompt_Reboot {
              param(
                  [string]$Message = "ABLESTACK tools installation is complete. The system needs to reboot.",
                  [string]$Title   = "ABLESTACK",
                  [int]   $Options = 0x0,     # 0x0: OK only / 0x4: Yes/No ??
                  [int]   $TimeoutSeconds = 60
              )

              $shell = New-Object -ComObject WScript.Shell

              # Popup return values:
              #   -1 = timeout
              #    1 = OK
              $result = $shell.Popup($Message, $TimeoutSeconds, $Title, $Options)

              if ($result -eq -1 -or $result -eq 1 -or $result -eq 6) {
                  Write-Host "Prompt_Reboot: user accepted or no response within timeout. Rebooting..."
                  # Force reboot after user confirmation or timeout.
                  Restart-Computer -Force
                  # MSI installs use /norestart and REBOOT=ReallySuppress; reboot is handled here.
              }
              else {
                  Write-Host "Prompt_Reboot: user canceled reboot (result = $result)."
              }
          }

          Ensure-Admin

          $logPath = "C:\Windows\Temp\ablestack-virtio-install.log"
          Start-Transcript -Path $logPath -Append | Out-Null

          $global:rebootNeeded = $false
          function Handle-MsiExit($code, $component, $logFile) {
            switch ($code) {
              0     { Write-Host "[OK] $component installed."; return }
              3010  { Write-Host "[OK] $component installed. Reboot required (3010)."
                      $global:rebootNeeded = $true; return }
              default { throw "$component install failed with code $code. See $logFile" }
            }
          }

          try {
            $ScriptDir = Split-Path -Path $MyInvocation.MyCommand.Path -Parent
            $VirtioDir = Join-Path $ScriptDir "virtio"
            $MsiDir    = Join-Path $ScriptDir "msi"

            if (-not (Test-Path $MsiDir)) { throw "MSI folder not found: $MsiDir" }

            # Locate VirtIO guest tools EXE
            $candidateExe = @(
              (Join-Path $ScriptDir  "virtio-win-guest-tools.exe"),
              (Join-Path $VirtioDir  "virtio-win-guest-tools.exe")
            ) + (Get-ChildItem -Path $VirtioDir -Recurse -Filter "virtio-win-guest-tools.exe" -ErrorAction SilentlyContinue | Select-Object -Expand FullName)
            $virtioExe = $candidateExe | Where-Object { Test-Path $_ } | Select-Object -First 1

            # MSI fallback
            $candidateMsi = @(
              (Join-Path $ScriptDir "virtio-win-gt-x64.msi"),
              (Join-Path $VirtioDir "virtio-win-gt-x64.msi")
            ) + (Get-ChildItem -Path $VirtioDir -Recurse -Filter "virtio-win-gt-*.msi" -ErrorAction SilentlyContinue | Select-Object -Expand FullName)
            $virtioMsi = $candidateMsi | Where-Object { Test-Path $_ } | Sort-Object -Descending | Select-Object -First 1

            $installOk = $false
            if ($virtioExe) {
              Write-Host "[STEP] Installing VirtIO guest tools (EXE): $virtioExe"
              $exeTry = @('/quiet /norestart','/qn /norestart','/S','/s')
              foreach ($argsStr in $exeTry) {
                Write-Host "  -> Trying args: $argsStr"
                $p = Start-Process -FilePath $virtioExe -ArgumentList $argsStr -PassThru -Wait -NoNewWindow
                if ($p.ExitCode -eq 0 -or $p.ExitCode -eq 3010) {
                  if ($p.ExitCode -eq 3010) { $global:rebootNeeded = $true }
                  $installOk = $true
                  Write-Host "[OK] VirtIO guest tools installed (EXE, code $($p.ExitCode))."
                  break
                } else {
                  Write-Warning "    ExitCode=$($p.ExitCode). Trying next switch..."
                }
              }
            }

            if (-not $installOk) {
              if (-not $virtioMsi) { throw "Neither virtio-win-guest-tools.exe nor virtio-win-gt-*.msi could be executed/found." }
              Write-Host "[STEP] Installing VirtIO guest tools (MSI fallback): $virtioMsi"
              $msiLog = Join-Path $env:TEMP "virtio-win-guest-tools-msi.log"
              $msiArgs = "/i `"$virtioMsi`" /qn /norestart /l*v `"$msiLog`" ADDLOCAL=ALL"
              $p = Start-Process -FilePath "msiexec.exe" -ArgumentList $msiArgs -PassThru -Wait -NoNewWindow
              Handle-MsiExit -code $p.ExitCode -component "VirtIO guest tools (MSI)" -logFile $msiLog
              $installOk = $true
            }

            # Install ablestack MSI
            Write-Host "[STEP] Installing ablestack-qemu-exec-tools (MSI)"
            $execMsi = Get-ChildItem -Path $MsiDir -Filter *.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if (-not $execMsi) { throw "No ablestack MSI found in $MsiDir" }

            $execLog = Join-Path $env:TEMP "ablestack-qemu-exec-tools-msi.log"
            $execArgs = "/i `"$($execMsi.FullName)`" /qn /norestart /l*v `"$execLog`""
            $p = Start-Process -FilePath "msiexec.exe" -ArgumentList $execArgs -PassThru -Wait -NoNewWindow
            Handle-MsiExit -code $p.ExitCode -component "ablestack-qemu-exec-tools" -logFile $execLog

            # Completion message
            if ($global:rebootNeeded) {
              Prompt_Reboot "ABLESTACK tools installation completed. Reboot now?" "ABLESTACK" 0x0 30
            } else {
              Show-Info "Installation completed successfully. No reboot is required."
            }
          }
          catch {
            Write-Error $_
            exit 1
          }
          finally {
            Stop-Transcript | Out-Null
          }
          PS1

          cat > release/install.bat << 'BAT'
          @echo off
          setlocal
          rem Always run non-silent mode by default
          powershell -NoProfile -ExecutionPolicy Bypass -File "%~dp0install.ps1"
          if errorlevel 1 (
            echo [ERROR] Install failed. See C:\Windows\Temp\ablestack-virtio-install.log
            exit /b 1
          )
          
          REM --- Installation marker ---
          mkdir "C:\ProgramData\AbleStack" 2>nul
          echo ok> "C:\ProgramData\AbleStack\autoinstall.done"
          echo [OK] Installation finished.
          endlocal
          BAT

      - name: Create README.txt (updated)
        run: |
          cat <<'EOF' > release/README.txt
          ablestack-qemu-exec-tools Offline Installation ISO
          ==================================================
          Contents
            - RPM repos:
                rpm/rpm-rocky9.6
                rpm/ftctl-rpm-rocky9.6
            - DEB repos:
                deb/deb-ubuntu22.04
                deb/deb-ubuntu24.04
            - Windows:
                msi/ (ablestack-qemu-exec-tools .msi)
                virtio/ (VirtIO Windows drivers + Guest Tools from stable-virtio)
            - Universal installer:
                install-linux.sh
                uninstall-linux.sh
            - Shell completions:
                completions/ablestack_v2k
                completions/ablestack_vm_ftctl
            - Windows installers:
                install.bat / install.ps1
            - FTCTL (ABLESTACK Host add-on):
                rpm/ftctl-rpm-rocky9.6
            - V2K (ABLESTACK Host add-on):
                v2k/v2k-rpm-rocky9.6 (offline RPM repo for ablestack_v2k)
                assets/govc_Linux_x86_64.tar.gz
                assets/VMware-vix-disklib-*.tar.gz
                assets/v2k/wheels (pyvmomi offline wheels)


          Windows (recommended)
            1) Mount ISO in the Windows VM.
            2) Run install.bat (or install.ps1) as Administrator.
               - Installs VirtIO Guest Tools (drivers & agent) silently.
               - Installs ablestack-qemu-exec-tools (MSI) silently.
            3) Reboot is recommended after completion.

          Linux
            1) mount -o loop ablestack-qemu-exec-tools-<VERSION>.iso /mnt
            2) cd /mnt && sudo ./install-linux.sh
            3) remove with sudo ./uninstall-linux.sh
          EOF

      - name: Create install-linux.sh (V2K add-on for ABLESTACK; keep existing flows)
        run: |
          cat <<'EOF' > release/install-linux.sh
          #!/usr/bin/env bash
          set -e
          ISO_MNT="$(cd "$(dirname "$0")" && pwd -P)"

          echo "[INFO] ABLESTACK QEMU Exec Tools Installer"
          echo "[INFO] Detecting distribution..."

          if [ -f /etc/os-release ]; then
              . /etc/os-release
              DISTRO=$ID
              MAJOR_VERSION=$(echo $VERSION_ID | cut -d'.' -f1)
          else
              echo "[ERROR] Cannot detect distribution!"
              exit 1
          fi

          case "$DISTRO" in
              rocky|rhel|centos|almalinux|fedora)
                  echo "[INFO] Detected RPM-based system ($DISTRO $MAJOR_VERSION)"
                  REPO_FILE=/etc/yum.repos.d/ablestack-qemu-exec-tools.repo
                  REPO_PATH=""
                  for cand in "$ISO_MNT/rpm/rpm-rocky${VERSION_ID}" "$ISO_MNT/rpm/rpm-rocky${MAJOR_VERSION}"; do
                      if [[ -d "${cand}" ]]; then
                          REPO_PATH="$(realpath "${cand}")"
                          break
                      fi
                  done
                  if [[ -z "${REPO_PATH}" ]]; then
                      echo "[ERROR] RPM repo not found in ISO for ${DISTRO} ${VERSION_ID}"
                      exit 1
                  fi
                  sudo tee "$REPO_FILE" >/dev/null <<EOR
          [ablestack-qemu-exec-tools]
          name=ablestack-qemu-exec-tools
          baseurl=file://$REPO_PATH
          enabled=1
          gpgcheck=0
          EOR
                  sudo dnf clean all
                  sudo dnf -y --disablerepo="*" --enablerepo="ablestack-qemu-exec-tools" install ablestack-qemu-exec-tools
                  sudo rm -f /etc/yum.repos.d/ablestack-qemu-exec-tools.repo
                  sudo dnf clean all

                  # ======================================================================
                  # HANGCTL add-on (ABLESTACK Host only, Rocky 9.6 preferred)
                  #  - Install ablestack_vm_hangctl from ISO local repo
                  #  - If not ABLESTACK host / not Rocky9 -> skip
                  # ======================================================================
                  if [[ "${PRETTY_NAME:-}" == *"ABLESTACK"* && "${MAJOR_VERSION:-}" == "9" ]]; then
                      echo "[INFO] ABLESTACK Host on Rocky 9 detected. Installing HANGCTL add-on..."

                      HANGCTL_REPO_DIR=""
                      for cand in "${ISO_MNT}/rpm/hangctl-rpm-rocky${VERSION_ID}" "${ISO_MNT}/rpm/hangctl-rpm-rocky${MAJOR_VERSION}" "${ISO_MNT}/rpm/hangctl-rpm-rocky9.6"; do
                          if [[ -d "${cand}" ]]; then
                              HANGCTL_REPO_DIR="${cand}"
                              break
                          fi
                      done
                      if [[ -d "${HANGCTL_REPO_DIR}" ]]; then
                          HANGCTL_REPO_FILE=/etc/yum.repos.d/ablestack-vm-hangctl.repo
                          sudo tee "${HANGCTL_REPO_FILE}" >/dev/null <<-EOH
          [ablestack-vm-hangctl]
          name=ablestack-vm-hangctl
          baseurl=file://${HANGCTL_REPO_DIR}
          enabled=1
          gpgcheck=0
          EOH
                          sudo dnf clean all
                          if sudo dnf -y --disablerepo="*" --enablerepo="ablestack-vm-hangctl" install ablestack_vm_hangctl; then
                              echo "[OK] ablestack_vm_hangctl installed."
                          else
                              echo "[WARN] Failed to install ablestack_vm_hangctl from ISO repo. Continuing."
                          fi
                          sudo rm -f "${HANGCTL_REPO_FILE}"
                          sudo dnf clean all
                      else
                          echo "[WARN] HANGCTL RPM repo not found in ISO: ${HANGCTL_REPO_DIR} (skip)"
                      fi
                  else
                      echo "[INFO] HANGCTL add-on skipped (not ABLESTACK host or not Rocky 9)."
                  fi

                  if [[ "${PRETTY_NAME:-}" == *"ABLESTACK"* && "${MAJOR_VERSION:-}" == "9" ]]; then
                      echo "[INFO] ABLESTACK Host on Rocky 9 detected. Installing FTCTL add-on..."

                      FTCTL_REPO_DIR=""
                      for cand in "${ISO_MNT}/rpm/ftctl-rpm-rocky${VERSION_ID}" "${ISO_MNT}/rpm/ftctl-rpm-rocky${MAJOR_VERSION}" "${ISO_MNT}/rpm/ftctl-rpm-rocky9.6"; do
                          if [[ -d "${cand}" ]]; then
                              FTCTL_REPO_DIR="${cand}"
                              break
                          fi
                      done
                      if [[ -d "${FTCTL_REPO_DIR}" ]]; then
                          FTCTL_REPO_FILE=/etc/yum.repos.d/ablestack-vm-ftctl.repo
                          sudo tee "${FTCTL_REPO_FILE}" >/dev/null <<-EOFCTL
          [ablestack-vm-ftctl]
          name=ablestack-vm-ftctl
          baseurl=file://${FTCTL_REPO_DIR}
          enabled=1
          gpgcheck=0
          EOFCTL
                          sudo dnf clean all
                          if sudo dnf -y --disablerepo="*" --enablerepo="ablestack-vm-ftctl" install ablestack_vm_ftctl; then
                              echo "[OK] ablestack_vm_ftctl installed."
                          else
                              echo "[WARN] Failed to install ablestack_vm_ftctl from ISO repo. Continuing."
                          fi
                          sudo rm -f "${FTCTL_REPO_FILE}"
                          sudo dnf clean all
                      else
                          echo "[WARN] FTCTL RPM repo not found in ISO: ${FTCTL_REPO_DIR} (skip)"
                      fi
                  else
                      echo "[INFO] FTCTL add-on skipped (not ABLESTACK host or not Rocky 9)."
                  fi

                  # ======================================================================
                  # V2K add-on (ABLESTACK Host only)
                  #  - based on bin/v2k_test_install.sh
                  #  - Air-Gap: pyvmomi installs from ISO offline wheels
                  #  - NO ldconfig / NO global linker path modifications
                  # ======================================================================
                  if [[ "${PRETTY_NAME:-}" == *"ABLESTACK"* && "${VERSION_ID:-}" == 9.6* ]]; then
                      echo "[INFO] ABLESTACK 9.6 detected. Installing V2K add-on..."

                      has_cmd() { command -v "$1" >/dev/null 2>&1; }

                      # 1) Install ablestack_v2k RPM from ISO local repo
                      V2K_REPO_DIR="${ISO_MNT}/v2k/v2k-rpm-rocky9.6"
                      if [[ -d "${V2K_REPO_DIR}" ]]; then
                          V2K_REPO_FILE=/etc/yum.repos.d/ablestack-v2k.repo
                          sudo tee "${V2K_REPO_FILE}" >/dev/null <<-EOV
          [ablestack-v2k]
          name=ablestack-v2k
          baseurl=file://${V2K_REPO_DIR}
          enabled=1
          gpgcheck=0
          EOV
                          sudo dnf clean all
                          sudo dnf -y --disablerepo="*" --enablerepo="ablestack-v2k" install ablestack_v2k || \
                            sudo dnf -y --disablerepo="*" --enablerepo="ablestack-v2k" install ablestack_v2k || \
                            sudo dnf -y localinstall "${V2K_REPO_DIR}"/*.rpm
                          sudo rm -f "${V2K_REPO_FILE}"
                          sudo dnf clean all
                      else
                          echo "[WARN] V2K RPM repo not found in ISO: ${V2K_REPO_DIR}"
                      fi

                      # 2) Install compatibility profile assets from ISO
                      V2K_INSTALLER_BIN="$(command -v v2k_test_install.sh || true)"
                      if [[ -z "${V2K_INSTALLER_BIN}" && -x "${ISO_MNT}/bin/v2k_test_install.sh" ]]; then
                          V2K_INSTALLER_BIN="${ISO_MNT}/bin/v2k_test_install.sh"
                      fi
                      if [[ -x "${V2K_INSTALLER_BIN}" ]]; then
                          echo "[INFO] Installing V2K compatibility profiles from ISO assets..."
                          sudo "${V2K_INSTALLER_BIN}" \
                            --repo-root "${ISO_MNT}" \
                            --skip-install \
                            --install-assets \
                            --install-profile all \
                            --validate-profile all
                      else
                          echo "[WARN] v2k_test_install.sh not found after ablestack_v2k installation."
                          echo "[WARN] Skipping compatibility profile asset installation."
                      fi

                      # Optional WinPE ISO staging for Windows bootstrap scenarios
                      # Include the first matching winpe ISO found under supported paths.
                      WINPE_SRC_DIR="${ISO_MNT}/winpe"
                      WINPE_DST_DIR="/usr/share/ablestack/v2k/winpe"
                      WINPE_LINK="/usr/share/ablestack/v2k/winpe.iso"
                      if [[ -d "${WINPE_SRC_DIR}" ]]; then
                          WINPE_ISO_FILE="$(ls -1 "${WINPE_SRC_DIR}"/*.iso 2>/dev/null | head -n 1 || true)"
                          if [[ -n "${WINPE_ISO_FILE}" && -f "${WINPE_ISO_FILE}" ]]; then
                              echo "[INFO] Installing WinPE ISO from: ${WINPE_ISO_FILE}"
                              sudo mkdir -p "${WINPE_DST_DIR}"
                              sudo cp -a "${WINPE_ISO_FILE}" "${WINPE_DST_DIR}/"
                              sudo ln -sfn "${WINPE_DST_DIR}/$(basename "${WINPE_ISO_FILE}")" "${WINPE_LINK}"
                              echo "[OK] WinPE ISO installed: ${WINPE_LINK}"
                          else
                              echo "[WARN] WinPE ISO not found under ${WINPE_SRC_DIR}"
                          fi
                      else
                          echo "[WARN] WinPE dir not found in ISO: ${WINPE_SRC_DIR} (skip)"
                      fi
                  fi
                  ;;
              ubuntu|debian)
                  echo "[INFO] Detected DEB-based system ($DISTRO $MAJOR_VERSION)"
                  UBUNTU_DIR="${MAJOR_VERSION}.04"
                  REPO_PATH=$(realpath "$ISO_MNT/deb/deb-ubuntu${UBUNTU_DIR}")
                  LIST_FILE=/etc/apt/sources.list.d/ablestack-qemu-exec-tools.list
                  echo "deb [trusted=yes] file://$REPO_PATH stable main" | sudo tee $LIST_FILE >/dev/null
                  sudo apt-get update
                  sudo apt-get -y install ablestack-qemu-exec-tools
                  sudo rm -f /etc/apt/sources.list.d/ablestack-qemu-exec-tools.list
                  sudo apt-get update
                  ;;
              *)
                  echo "[ERROR] Unsupported distribution: $DISTRO"
                  exit 1
                  ;;
          esac

          if [[ -d "${ISO_MNT}/completions" ]]; then
              echo "[INFO] Installing bash completion files from ISO..."
              sudo mkdir -p /usr/share/bash-completion/completions
              if [[ -f "${ISO_MNT}/completions/ablestack_v2k" ]]; then
                  sudo install -m 0644 "${ISO_MNT}/completions/ablestack_v2k" /usr/share/bash-completion/completions/ablestack_v2k
              fi
              if [[ -f "${ISO_MNT}/completions/ablestack_vm_ftctl" ]]; then
                  sudo install -m 0644 "${ISO_MNT}/completions/ablestack_vm_ftctl" /usr/share/bash-completion/completions/ablestack_vm_ftctl
              fi
          fi

          # --- Installation marker ---
          mkdir -p /var/lib/ablestack
          echo ok > /var/lib/ablestack/autoinstall.done
          echo "[INFO] Installation complete."
          EOF
          chmod +x release/install-linux.sh

      - name: Sanity check generated install-linux.sh
        run: |
          set -e
          bash -n release/install-linux.sh

      - name: Create uninstall-linux.sh
        run: |
          cat <<'EOF' > release/uninstall-linux.sh
          #!/usr/bin/env bash
          set -euo pipefail

          echo "[INFO] ABLESTACK QEMU Exec Tools Uninstaller"

          if [[ -f /etc/os-release ]]; then
            . /etc/os-release
            DISTRO="${ID:-unknown}"
            MAJOR_VERSION="$(echo "${VERSION_ID:-0}" | cut -d'.' -f1)"
          else
            echo "[ERROR] Cannot detect distribution!"
            exit 1
          fi

          remove_path_if_exists() {
            local path="${1-}"
            [[ -n "${path}" && -e "${path}" ]] || return 0
            sudo rm -rf "${path}"
          }

          case "${DISTRO}" in
            rocky|rhel|centos|almalinux|fedora)
              echo "[INFO] Detected RPM-based system (${DISTRO} ${VERSION_ID:-unknown})"
              sudo dnf -y remove ablestack_v2k ablestack_vm_hangctl ablestack_vm_ftctl ablestack-qemu-exec-tools || true
              sudo dnf clean all || true
              ;;
            ubuntu|debian)
              echo "[INFO] Detected DEB-based system (${DISTRO} ${VERSION_ID:-unknown})"
              sudo apt-get -y remove ablestack-qemu-exec-tools || true
              sudo apt-get -y autoremove || true
              ;;
            *)
              echo "[ERROR] Unsupported distribution: ${DISTRO}"
              exit 1
              ;;
          esac

          remove_path_if_exists /etc/profile.d/v2k-vddk.sh
          remove_path_if_exists /etc/profile.d/v2k-compat.sh
          remove_path_if_exists /usr/share/ablestack/v2k
          remove_path_if_exists /usr/share/bash-completion/completions/ablestack_v2k
          remove_path_if_exists /usr/share/bash-completion/completions/ablestack_vm_ftctl

          if [[ -L /opt/vmware-vix-disklib-distrib ]]; then
            sudo rm -f /opt/vmware-vix-disklib-distrib
          fi
          if [[ -x /usr/local/bin/govc ]]; then
            sudo rm -f /usr/local/bin/govc
          fi

          if compgen -G "/opt/VMware-vix-disklib-*" >/dev/null 2>&1; then
            for d in /opt/VMware-vix-disklib-*; do
              [[ -e "${d}" ]] || continue
              sudo rm -rf "${d}"
            done
          fi

          sudo rm -f /var/lib/ablestack/autoinstall.done || true
          echo "[INFO] Uninstall complete."
          EOF
          chmod +x release/uninstall-linux.sh

      - name: Sanity check generated uninstall-linux.sh
        run: |
          set -e
          bash -n release/uninstall-linux.sh

      - name: Generate release notes (changelog)
        run: |
          set -e

          CURRENT_TAG="${RELEASE_TAG}"
          DESC="ABLESTACK QEMU Exec Tools is an automation toolkit for libvirt/KVM environments, providing guest command execution, VM lifecycle orchestration, and VMware-to-KVM (V2K) migration pipelines. This release includes ablestack_v2k with fully automated Windows cutover support using WinPE-based offline VirtIO driver injection."

          echo "# ablestack-qemu-exec-tools ${CURRENT_TAG}" > release_notes.md
          echo >> release_notes.md
          echo "${DESC}" >> release_notes.md
          echo >> release_notes.md

          # Build three OS-specific ISOs from staged release content
          # Each ISO contains only the payload relevant to that operating system.

          # Each ISO contains only the payload relevant to that operating system.
          PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          if [ -z "$PREV_TAG" ]; then
            echo "## Changes" >> release_notes.md
            git log --oneline "${CURRENT_TAG}" -- . | sed 's/^/- /' >> release_notes.md
          else
            echo "## Changes since ${PREV_TAG}" >> release_notes.md
            git log --oneline "${PREV_TAG}..${CURRENT_TAG}" -- . | sed 's/^/- /' >> release_notes.md
          fi

          echo "===== Generated release_notes.md ====="
          cat release_notes.md

      - name: Generate OS-specific ISOs
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG}"

          mkdir -p build/iso/rocky build/iso/ubuntu build/iso/windows
          rm -rf build/iso-staging
          mkdir -p build/iso-staging/rocky build/iso-staging/ubuntu build/iso-staging/windows

          cat <<'EOF' > build/iso-staging/rocky/README.txt
          ABLESTACK QEMU Exec Tools Offline ISO
          Target OS: Rocky Linux / ABLESTACK Host

          Contents
            - rpm/rpm-rocky9.6
            - rpm/hangctl-rpm-rocky9.6
            - v2k/v2k-rpm-rocky9.6
            - assets/
            - winpe/
            - completions/
            - install-linux.sh
            - uninstall-linux.sh
          EOF

          cat <<'EOF' > build/iso-staging/ubuntu/README.txt
          ABLESTACK QEMU Exec Tools Offline ISO
          Target OS: Ubuntu

          Contents
            - deb/deb-ubuntu22.04
            - deb/deb-ubuntu24.04
            - completions/
            - install-linux.sh
            - uninstall-linux.sh
          EOF

          cat <<'EOF' > build/iso-staging/windows/README.txt
          ABLESTACK QEMU Exec Tools Offline ISO
          Target OS: Windows

          Contents
            - msi/
            - virtio/
            - install.bat
            - install.ps1
          EOF

          mkdir -p build/iso-staging/rocky/rpm build/iso-staging/rocky/v2k build/iso-staging/rocky/completions build/iso-staging/rocky/bin
          cp -a release/rpm/rpm-rocky9.6 build/iso-staging/rocky/rpm/
          if [[ -d release/rpm/hangctl-rpm-rocky9.6 ]]; then
            cp -a release/rpm/hangctl-rpm-rocky9.6 build/iso-staging/rocky/rpm/
          fi
          if [[ -d release/rpm/ftctl-rpm-rocky9.6 ]]; then
            cp -a release/rpm/ftctl-rpm-rocky9.6 build/iso-staging/rocky/rpm/
          fi
          if [[ -d release/v2k/v2k-rpm-rocky9.6 ]]; then
            cp -a release/v2k/v2k-rpm-rocky9.6 build/iso-staging/rocky/v2k/
          fi
          if [[ -d release/assets ]]; then
            cp -a release/assets build/iso-staging/rocky/
          fi
          if [[ -d release/share ]]; then
            cp -a release/share build/iso-staging/rocky/
          fi
          if [[ -d release/winpe ]]; then
            cp -a release/winpe build/iso-staging/rocky/
          fi
          if [[ -d release/completions ]]; then
            cp -a release/completions/. build/iso-staging/rocky/completions/
          fi
          if [[ -d release/bin ]]; then
            cp -a release/bin/. build/iso-staging/rocky/bin/
          fi
          cp -a release/install-linux.sh build/iso-staging/rocky/
          cp -a release/uninstall-linux.sh build/iso-staging/rocky/

          mkdir -p build/iso-staging/ubuntu/deb build/iso-staging/ubuntu/completions
          cp -a release/deb/. build/iso-staging/ubuntu/deb/
          if [[ -d release/completions ]]; then
            cp -a release/completions/. build/iso-staging/ubuntu/completions/
          fi
          cp -a release/install-linux.sh build/iso-staging/ubuntu/
          cp -a release/uninstall-linux.sh build/iso-staging/ubuntu/

          mkdir -p build/iso-staging/windows/msi build/iso-staging/windows/virtio
          if [[ -d release/msi ]]; then
            cp -a release/msi/. build/iso-staging/windows/msi/
          fi
          if [[ -d release/virtio ]]; then
            cp -a release/virtio/. build/iso-staging/windows/virtio/
          fi
          cp -a release/install.bat build/iso-staging/windows/
          cp -a release/install.ps1 build/iso-staging/windows/

          mkisofs -o "build/iso/rocky/ABLESTACK-Tools-rocky-${VERSION}.iso" \
            -V "ABLESTACK-Rocky" \
            -r -J build/iso-staging/rocky

          mkisofs -o "build/iso/ubuntu/ABLESTACK-Tools-ubuntu-${VERSION}.iso" \
            -V "ABLESTACK-Ubuntu" \
            -r -J build/iso-staging/ubuntu

          mkisofs -o "build/iso/windows/ABLESTACK-Tools-windows-${VERSION}.iso" \
            -V "ABLESTACK-Windows" \
            -r -J build/iso-staging/windows

          find build/iso -type f -name '*.iso' -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release_notes.md
          files: |
            build/iso/rocky/*.iso
            build/iso/ubuntu/*.iso
            build/iso/windows/*.iso
            release/rpm/rpm-rocky9.6/ablestack-qemu-exec-tools-*.rpm
            release/rpm/hangctl-rpm-rocky9.6/*.rpm
            release/rpm/ftctl-rpm-rocky9.6/*.rpm
            release/v2k/v2k-rpm-rocky9.6/ablestack_v2k-*.rpm
