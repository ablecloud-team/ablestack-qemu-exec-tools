          # xargs?黎??筌???삠렑?repo?????곗뒭??????棺堉?댆洹ⓦ럹?????嶺뚮Ŋ??????????袁ｋ쨨?耀붾굛?????醫뤿??          : > /tmp/v2k_to_download_avail.txt
          cat /tmp/v2k_to_download_candidate.txt \
