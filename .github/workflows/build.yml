          # - ??⑤벡逾??9.6 vault baseurl???띠럾?嶺?repo??"嶺뚯쉳??? ??諛댁뎽
          # ======================================================================
          cat > /etc/yum.repos.d/rocky-vault-9.6.repo <<'EOF'
          [rocky-vault-9.6-baseos]
