name: N2K CI

on:
  push:
    branches: ["main", "develop", "feature/ablestack_n2k"]
    paths:
      - "bin/ablestack_n2k.sh"
      - "lib/n2k/**"
      - "docs/n2k/**"
      - "tests/fixtures/n2k/**"
      - "completions/ablestack_n2k"
      - "rpm/ablestack_n2k.spec"
      - "deb/ablestack_n2k.control"
      - "Makefile"
      - ".github/workflows/n2k-ci.yml"
  pull_request:
    paths:
      - "bin/ablestack_n2k.sh"
      - "lib/n2k/**"
      - "docs/n2k/**"
      - "tests/fixtures/n2k/**"
      - "completions/ablestack_n2k"
      - "rpm/ablestack_n2k.spec"
      - "deb/ablestack_n2k.control"
      - "Makefile"
      - ".github/workflows/n2k-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Shell syntax
        run: bash -n bin/ablestack_n2k.sh lib/n2k/*.sh

      - name: Shellcheck
        run: shellcheck bin/ablestack_n2k.sh lib/n2k/*.sh

      - name: JSON fixtures
        run: find tests/fixtures/n2k -name '*.json' -print0 | xargs -0 jq empty

      - name: LF line endings
        shell: bash
        run: |
          set -euo pipefail
          if LC_ALL=C grep -RIl $'\r' \
            bin/ablestack_n2k.sh lib/n2k docs/n2k tests/fixtures/n2k completions/ablestack_n2k rpm/ablestack_n2k.spec deb/ablestack_n2k.control; then
            echo "CRLF line endings detected." >&2
            exit 1
          fi

      - name: Source English guard
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInP '[\x{AC00}-\x{D7A3}]' bin/ablestack_n2k.sh lib/n2k tests/fixtures/n2k completions/ablestack_n2k rpm/ablestack_n2k.spec deb/ablestack_n2k.control; then
            echo "Korean text detected in source paths." >&2
            exit 1
          fi

      - name: Fixture smoke
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          printf 'aaaabbbb\n' > "${tmpdir}/disk0-base.raw"
          printf '11112222\n' > "${tmpdir}/disk1-base.raw"
          base_map="$(jq -nc --arg d0 "${tmpdir}/disk0-base.raw" --arg d1 "${tmpdir}/disk1-base.raw" '{"disk-ext-001":$d0,"disk-ext-002":$d1}')"
          bin/ablestack_n2k.sh --workdir "${tmpdir}/work" --run-id n2k-ci --manifest "${tmpdir}/work/manifest.json" init \
            --vm app-01 --pc pc.example --dst "${tmpdir}/target" \
            --inventory-file tests/fixtures/n2k/inventory/vm_linux.json \
            --target-format raw --target-storage file >/dev/null
          bin/ablestack_n2k.sh --workdir "${tmpdir}/work" --manifest "${tmpdir}/work/manifest.json" sync base \
            --source-map-json "${base_map}" >/dev/null
          printf 'ZZZZbbbb\n' > "${tmpdir}/disk0-incr.raw"
          printf '1111YYYY\n' > "${tmpdir}/disk1-incr.raw"
          incr_map="$(jq -nc --arg d0 "${tmpdir}/disk0-incr.raw" --arg d1 "${tmpdir}/disk1-incr.raw" '{"disk-ext-001":$d0,"disk-ext-002":$d1}')"
          bin/ablestack_n2k.sh --workdir "${tmpdir}/work" --manifest "${tmpdir}/work/manifest.json" sync incr \
            --source-map-json "${incr_map}" \
            --changed-regions-file tests/fixtures/n2k/changed_regions/non_empty.json \
            --recovery-point-id rp-ci-incr >/dev/null
          jq -e '.phases.incr_sync.done == true and .disks[0].metrics.incr_bytes_written == 4' "${tmpdir}/work/manifest.json" >/dev/null
          test "$(cat "${tmpdir}/target/app-01-disk0.raw")" = "ZZZZbbbb"
          test "$(cat "${tmpdir}/target/app-01-disk1.raw")" = "1111YYYY"

  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
      options: --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install RPM build dependencies
        run: |
          dnf -y install make rpm-build tar git

      - name: Build N2K RPM
        run: make n2k-rpm

      - uses: actions/upload-artifact@v4
        with:
          name: n2k-rpm
          path: build/rpm-n2k/*.rpm

  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DEB build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make dpkg-dev

      - name: Build N2K DEB
        run: make n2k-deb

      - uses: actions/upload-artifact@v4
        with:
          name: n2k-deb
          path: build/deb-n2k/*.deb
